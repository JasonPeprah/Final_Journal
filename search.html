<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="search.css">
    <title>Search</title>
</head>
<body>
    <div id="app-section" class="main">
        <div class="top">
            <div class="box1"><i class="bi bi-calendar-plus-fill"></i></div>
            <div class="box2">
                <input type="number" class="box_month" placeholder="MM" min="1" max="12">
                <input type="number" class="box_date" placeholder="DD" min="1" max="31">
                <input type="number" class="box_year" placeholder="YYYY" min="1900" max="2100">
            </div>
            <div class="box3">
                <button>Search<i id="search_icon" class="bi bi-search"></i></button>
                <hr>
            </div>
        </div>
        <div class="middle">
            <button class="results">
                <p>Results</p>
            </button>
        </div>
        <footer>
            <div class="footerbox1">
                <i id="journal" class="bi bi-plus-square"></i>
                <p>Journal</p>
            </div>
            <div class="footerbox2 active">
                <i id="search" class="bi bi-calendar4"></i>
                <p>Search</p>
            </div>
        </footer>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="index.js?v=1"></script>
</body>
</html>
