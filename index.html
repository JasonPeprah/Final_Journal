<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css?v=1">
    <title>FinalJournal</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1915">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css?v=1">
</head>
<body>
    <div id="auth-section" class="auth-container">
        <button class="google-signin-btn" id="googleSignInBtn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo">
            Sign in with Google
        </button>
    </div>

    <div id="app-section" class="main" style="display: none;">
        <button id="logoutBtn" class="logout-btn">Logout</button>
        <div class="top">
            <div class="mini-top">
                <h1 class="Header">Good Morning</h1>
                <h3 class="comment">Have a fruitful day</h3> 
            </div>
            <button class="button">Journal</button>
        </div>
        <footer>
            <div class="footerbox1 active">
                <i id="journal" class="bi bi-plus-square"></i>
                <p>Journal</p>
            </div>
            <div class="footerbox2">
                <i id="search" class="bi bi-calendar4"></i>
                <p>Search</p>
            </div>
        </footer>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="index.js?v=1"></script>
</body>
</html>
